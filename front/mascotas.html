<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascotas en Adopción - Hocico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">Nuestros Amigos</h1>
            <p class="lead">Encontrá a tu compañero ideal entre los peluditos que buscan un hogar.</p>
        </header>

        <section class="row mb-4 justify-content-center">
            <div class="col-md-6 d-flex gap-2">
                <select class="form-select">
                    <option selected>Especie (Todos)</option>
                    <option value="1">Perros</option>
                    <option value="2">Gatos</option>
                </select>
                <select class="form-select">
                    <option selected>Tamaño</option>
                    <option value="1">Pequeño</option>
                    <option value="2">Mediano</option>
                    <option value="3">Grande</option>
                </select>
            </div>
        </section>

        <div class="row g-4" id="mascotas-container">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm custom-card">
                    <img src="img/Gemini_Generated_Image_5opn2y5...png" class="card-img-top p-3 rounded-5" alt="Mascota">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Firulais</h5>
                        <p class="card-text text-muted small">Macho • 2 años • Tamaño Mediano</p>
                        <p class="card-text">Es muy juguetón y se lleva bien con otros perros. ¡Le encanta el parque!</p>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <button class="btn btn-primary w-100 rounded-pill">Conocerme más</button>
                    </div>
                </div>
            </div>
            </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/theme-toggle.js"></script>
</body>
</html>
